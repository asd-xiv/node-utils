name: Code QA
on:
  workflow_call:
    inputs:
      cache-key:
        required: true
        type: string
      node-version:
        required: true
        type: string

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ inputs.cache-key }}

      - name: Run linting
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ inputs.cache-key }}

      - name: Run type checking
        run: npm run typecheck

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ inputs.cache-key }}

      - name: Run unit tests
        run: npm run unit-test
