name: Check
on:
  push:
    branches-ignore:
      - main
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-secrets:
    name: Detect Secrets
    uses: ./.github/workflows/_detect-secrets.yml

  install-dependencies:
    name: Install Dependencies
    uses: ./.github/workflows/_install-dependencies.yml

  lint-title:
    name: Conventional Commit
    if: github.event_name == 'pull_request_target'
    needs: [install-dependencies]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ needs.install-dependencies.outputs.node-version }}

      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ needs.install-dependencies.outputs.cache-key }}

      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: echo "$PR_TITLE" | npx commitlint

  code-qa:
    name: Code QA
    needs: [detect-secrets, install-dependencies]
    uses: ./.github/workflows/_code-qa.yml
    with:
      cache-key: ${{ needs.install-dependencies.outputs.cache-key }}
      node-version: ${{ needs.install-dependencies.outputs.node-version }}
